<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        span{
            display: block;
        }
        .conatiner{
            display: flex;
            gap: 250px;
            padding: 150px;
            justify-content: center;
            border: 2px double;
            width: 850px;
            margin: auto;
            margin-top: 200px;
            border-radius: 20px;
            
        }
        .right{
      background-image: url("assets/highway.jpg");
      background-repeat: no-repeat;
      background-position: center;
      width: 500px;
      height: 500px;
      border-radius: 20px;
        }
        .txt1{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .txt2{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .txt1>h1{
            color: white;
            padding-top: 150px;
            font-weight: bold;
        }
        .txt2>p{
            color: white;
            margin-right: 50px;
            padding-top: 20px;
            
        }
        .left{
            width: 500px;
      height: 500px;
      border-radius: 20px;
      background-color: white;
        }
        .left>h1{
            padding-top: 40px;
            padding-bottom: 30px;
            text-align: center;
            margin-right: 100px;
        }
        input{
            display: block;
            margin-top: 30px;
            width: 300px;
            height: 30px;
        border-radius: 1px;
        }
      h4{
        width: 300px;
        background-color: lightblue;
        height: 30px;
        text-align: center;
        border-radius: 10px;
        margin-top: 30px;
        padding-top: 10px;
      }
    </style>
</head>
<body>
    <div class="conatiner">
        <div class="right">
            <div class="txt1">
                <h1>Create Your <span>Account</span></h1>
            </div>
            <div class="txt2"><p>share your artwork <span>and Get projects</span></p></div>
            
        </div>
        <div class="left">
            <h1>Sign Up</h1>
            <div class="form">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
                <input type="email" placeholder="Email adress">
                <input type="password" placeholder="Password">
                <!-- <input id="btn" type="checkbox"><h5>Accept Terms & conditions</h5> -->
                 <h4><a href="index.html">Join us</a></h4>
            </div>
        </div>
    </div>



</body>
</html>
